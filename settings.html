<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Averion — Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div id="app" style="display:flex;width:100%;height:100vh">
    <div id="sidebar-placeholder"></div>
    <div class="main" id="main-content">
        <div id="topbar-placeholder"></div>
        <div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:var(--text2)">
            <div style="font-size:48px">🚧</div>
            <div style="font-size:18px;font-weight:600">Settings</div>
            <div style="font-size:13px">Coming soon — migrating from dashboard</div>
        </div>
    </div>
</div>
<div class="bottom-nav" id="bottom-nav"></div>
<script src="/base.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (!requireAuth()) return;
        document.getElementById('sidebar-placeholder').outerHTML = getSidebarHTML();
        document.getElementById('topbar-placeholder').outerHTML = getTopbarHTML('Settings');
        buildNav();
        buildUserRow();
        buildMobileNav();
    });
</script>
</body>
</html>
