<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Averion — Exchanges</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css?v=6">
</head>
<body>
<div id="app" style="display:flex;width:100%;height:100vh">
    <div id="sidebar-placeholder"></div>
    <div class="main">
        <div id="topbar-placeholder"></div>
        <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:16px;padding-bottom:80px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
                <div style="font-size:15px;font-weight:800">Exchanges & Wallets</div>
                <button class="btn btn-accent btn-sm" onclick="openAddModal()">+ Add Exchange</button>
            </div>
            <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Exchanges</div>
            <div id="excList" style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px">
                <div style="color:var(--text3);font-size:12px;padding:12px">Loading...</div>
            </div>
            <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Virtual Wallets</div>
            <div id="walletList" style="display:flex;flex-direction:column;gap:8px">
                <div style="color:var(--text3);font-size:12px;padding:12px">Loading...</div>
            </div>
        </div>
    </div>
</div>

<!-- Add Exchange Modal -->
<div id="addModal" style="display:none;position:fixed;inset:0;background:#000000CC;z-index:200;align-items:center;justify-content:center;padding:20px">
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:400px">
        <div style="font-size:15px;font-weight:700;margin-bottom:16px">Add Exchange</div>
        <div style="margin-bottom:12px">
            <div style="font-size:11px;color:var(--text3);margin-bottom:6px">EXCHANGE</div>
            <select id="add-exchange" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
                <option value="mexc">MEXC</option>
                <option value="binance">Binance</option>
                <option value="bybit">Bybit</option>
                <option value="kucoin">KuCoin</option>
                <option value="okx">OKX</option>
            </select>
        </div>
        <div style="margin-bottom:12px">
            <div style="font-size:11px;color:var(--text3);margin-bottom:6px">CUSTOM NAME</div>
            <input type="text" id="add-name" placeholder="e.g. My MEXC Account"
                style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
        </div>
        <div style="margin-bottom:12px">
            <div style="font-size:11px;color:var(--text3);margin-bottom:6px">API KEY</div>
            <input type="text" id="add-apikey"
                style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
        </div>
        <div style="margin-bottom:20px">
            <div style="font-size:11px;color:var(--text3);margin-bottom:6px">SECRET</div>
            <input type="password" id="add-secret"
                style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
        </div>
        <div style="display:flex;gap:10px">
            <button onclick="closeAddModal()" style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer">Cancel</button>
            <button onclick="saveExchange()" style="flex:1;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-weight:700;cursor:pointer">Connect</button>
        </div>
    </div>
</div>

<!-- Edit Exchange Modal -->
<div id="editExcModal" style="display:none;position:fixed;inset:0;background:#000000CC;z-index:200;align-items:center;justify-content:center;padding:20px">
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:400px">
        <div style="font-size:15px;font-weight:700;margin-bottom:16px">Edit Exchange</div>
        <div style="margin-bottom:12px">
            <div style="font-size:11px;color:var(--text3);margin-bottom:6px">CUSTOM NAME</div>
            <input type="text" id="edit-exc-name"
                style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
        </div>
        <div style="margin-bottom:12px">
            <div style="font-size:11px;color:var(--text3);margin-bottom:6px">API KEY</div>
            <input type="text" id="edit-exc-apikey" placeholder="Leave blank to keep current"
                style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
        </div>
        <div style="margin-bottom:20px">
            <div style="font-size:11px;color:var(--text3);margin-bottom:6px">SECRET</div>
            <input type="password" id="edit-exc-secret" placeholder="Leave blank to keep current"
                style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
        </div>
        <div style="display:flex;gap:10px">
            <button onclick="closeEditExcModal()" style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer">Cancel</button>
            <button onclick="saveEditExchange()" style="flex:1;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-weight:700;cursor:pointer">Save</button>
        </div>
    </div>
</div>

<!-- Edit Wallet Modal -->
<div id="editWalletModal" style="display:none;position:fixed;inset:0;background:#000000CC;z-index:200;align-items:center;justify-content:center;padding:20px">
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:400px">
        <div style="font-size:15px;font-weight:700;margin-bottom:16px">Edit Wallet</div>
        <div style="margin-bottom:12px">
            <div style="font-size:11px;color:var(--text3);margin-bottom:6px">WALLET NAME</div>
            <input type="text" id="edit-wallet-name"
                style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
        </div>
        <div style="margin-bottom:20px">
            <div style="font-size:11px;color:var(--text3);margin-bottom:6px">TOTAL ALLOCATION ($)</div>
            <input type="number" id="edit-wallet-amount" inputmode="decimal" step="10" min="1"
                style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
        </div>
        <div style="display:flex;gap:10px">
            <button onclick="closeEditWalletModal()" style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer">Cancel</button>
            <button onclick="saveEditWallet()" style="flex:1;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-weight:700;cursor:pointer">Save</button>
        </div>
    </div>
</div>

<div class="bottom-nav" id="bottom-nav"></div>
<script src="/base.js?v=7"></script>
<script>
async function loadExchanges() {
    try {
        const res = await fetch(`${API}/api/exchanges`, {headers: authHeaders()});
        const data = await res.json();
        const list = document.getElementById('excList');
        if (!data.length) {
            list.innerHTML = `<div style="background:var(--bg2);border:1px dashed var(--border2);border-radius:12px;padding:16px;text-align:center">
                <div style="color:var(--text3);font-size:12px;margin-bottom:8px">No exchanges connected</div>
                <button onclick="openAddModal()" style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer">+ Add Exchange</button>
            </div>`;
            return;
        }
        list.innerHTML = data.map(exc => `
            <div onclick="openEditExcModal(${exc.id}, '${exc.custom_name || exc.exchange}')" style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer">
                <div style="display:flex;align-items:center;gap:12px">
                    <div style="width:36px;height:36px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px">🔗</div>
                    <div>
                        <div style="font-size:13px;font-weight:600">${exc.custom_name || exc.exchange}</div>
                        <div style="font-size:11px;color:var(--text3);margin-top:2px">${exc.exchange.toUpperCase()}</div>
                    </div>
                </div>
                <div style="font-size:11px;color:${exc.active ? 'var(--green)' : 'var(--text3)'}">
                    ${exc.active ? '● Active' : '○ Inactive'}
                </div>
            </div>`).join('');
    } catch(e) {
        document.getElementById('excList').innerHTML = '<div style="color:var(--red);font-size:12px;padding:12px">Error loading exchanges</div>';
    }
}

async function loadWallets() {
    try {
        const res = await fetch(`${API}/wallets`, {headers: authHeaders()});
        const data = await res.json();
        const list = document.getElementById('walletList');
        if (!data.length) {
            list.innerHTML = '<div style="color:var(--text3);font-size:12px;padding:12px">No wallets found</div>';
            return;
        }
        list.innerHTML = data.map(w => {
            const total = parseFloat(w.allocation_amount || 0);
            const available = parseFloat(w.available || w.current_balance || 0);
            const deployed = parseFloat(w.deployed || w.committed_usdt || 0);
            const pct = total > 0 ? Math.min(100, deployed / total * 100) : 0;
            return `
            <div onclick="openEditWalletModal(${w.id}, '${w.name}', ${total})" style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
                    <div>
                        <div style="font-size:13px;font-weight:600">${w.name}</div>
                        <div style="font-size:11px;color:var(--text3);margin-top:2px">${w.is_paper ? '📄 Paper' : '💳 Live'}</div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-size:14px;font-weight:700">$${total.toFixed(2)}</div>
                        <div style="font-size:11px;color:var(--text3)">Total</div>
                    </div>
                </div>
                <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:6px">
                    <span>Available <strong style="color:var(--green)">$${available.toFixed(2)}</strong></span>
                    <span>Deployed <strong>$${deployed.toFixed(2)}</strong></span>
                </div>
                <div style="height:4px;background:var(--border);border-radius:2px">
                    <div style="height:100%;width:${pct.toFixed(1)}%;background:var(--accent);border-radius:2px;transition:width 0.3s"></div>
                </div>
            </div>`;
        }).join('');
    } catch(e) {
        document.getElementById('walletList').innerHTML = '<div style="color:var(--red);font-size:12px;padding:12px">Error loading wallets</div>';
    }
}

function openAddModal() {
    document.getElementById('addModal').style.display = 'flex';
}
function closeAddModal() {
    document.getElementById('addModal').style.display = 'none';
}

async function saveExchange() {
    const exchange = document.getElementById('add-exchange').value;
    const name = document.getElementById('add-name').value.trim() || exchange.toUpperCase();
    const apiKey = document.getElementById('add-apikey').value.trim();
    const secret = document.getElementById('add-secret').value.trim();
    if (!apiKey) { alert('Please enter API key'); return; }
    try {
        const res = await fetch(`${API}/api/exchanges`, {
            method: 'POST', headers: authHeaders(),
            body: JSON.stringify({exchange, custom_name: name, api_key: apiKey, secret})
        });
        const d = await res.json();
        if (!res.ok) { alert(d.detail || 'Error'); return; }
        closeAddModal();
        await loadExchanges();
    } catch(e) { alert('Error connecting exchange'); }
}

let _editExcId = null;
let _editWalletId = null;

function openEditExcModal(id, name) {
    _editExcId = id;
    document.getElementById('edit-exc-name').value = name;
    document.getElementById('edit-exc-apikey').value = '';
    document.getElementById('edit-exc-secret').value = '';
    document.getElementById('editExcModal').style.display = 'flex';
}
function closeEditExcModal() {
    document.getElementById('editExcModal').style.display = 'none';
}
async function saveEditExchange() {
    const name = document.getElementById('edit-exc-name').value.trim();
    const apiKey = document.getElementById('edit-exc-apikey').value.trim();
    const secret = document.getElementById('edit-exc-secret').value.trim();
    const payload = {custom_name: name};
    if (apiKey) payload.api_key = apiKey;
    if (secret) payload.secret = secret;
    try {
        const res = await fetch(`${API}/api/exchanges/${_editExcId}`, {
            method: 'PUT', headers: authHeaders(),
            body: JSON.stringify(payload)
        });
        if (!res.ok) { const d = await res.json(); alert(d.detail || 'Error'); return; }
        closeEditExcModal();
        await loadExchanges();
    } catch(e) { alert('Error saving'); }
}

function openEditWalletModal(id, name, amount) {
    _editWalletId = id;
    document.getElementById('edit-wallet-name').value = name;
    document.getElementById('edit-wallet-amount').value = amount;
    document.getElementById('editWalletModal').style.display = 'flex';
}
function closeEditWalletModal() {
    document.getElementById('editWalletModal').style.display = 'none';
}
async function saveEditWallet() {
    const name = document.getElementById('edit-wallet-name').value.trim();
    const amount = parseFloat(document.getElementById('edit-wallet-amount').value);
    try {
        const res = await fetch(`${API}/wallets/${_editWalletId}`, {
            method: 'PUT', headers: authHeaders(),
            body: JSON.stringify({name, allocation_amount: amount})
        });
        if (!res.ok) { const d = await res.json(); alert(d.detail || 'Error'); return; }
        closeEditWalletModal();
        await loadWallets();
    } catch(e) { alert('Error saving'); }
}

document.addEventListener('DOMContentLoaded', async () => {
    if (!requireAuth()) return;
    document.getElementById('sidebar-placeholder').outerHTML = getSidebarHTML();
    document.getElementById('topbar-placeholder').outerHTML = getTopbarHTML('Exchanges');
    buildNav();
    buildUserRow();
    buildMobileNav();
    await Promise.all([loadExchanges(), loadWallets()]);
    setInterval(() => Promise.all([loadExchanges(), loadWallets()]), 30000);
});
</script>
</body>
</html>
