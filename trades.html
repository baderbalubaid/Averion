<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Averion — Trades</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css?v=4">
</head>
<body>
<div id="app" style="display:flex;width:100%;height:100vh">
    <div id="sidebar-placeholder"></div>
    <div class="main">
        <div id="topbar-placeholder"></div>
        <div style="flex:1;overflow-y:auto;padding:16px">

            <!-- Stats row -->
            <div class="hero-stats" style="margin-bottom:16px">
                <div class="hero-card">
                    <div class="hero-icon">📊</div>
                    <div class="hero-lbl">Open Trades</div>
                    <div class="hero-val" id="t-open">0</div>
                </div>
                <div class="hero-card g">
                    <div class="hero-icon">💰</div>
                    <div class="hero-lbl">Invested</div>
                    <div class="hero-val" id="t-invested">$0</div>
                </div>
                <div class="hero-card b">
                    <div class="hero-icon">📈</div>
                    <div class="hero-lbl">P&L</div>
                    <div class="hero-val" id="t-pnl">$0</div>
                </div>
                <div class="hero-card a">
                    <div class="hero-icon">🚀</div>
                    <div class="hero-lbl">TP Armed</div>
                    <div class="hero-val" id="t-tp">0</div>
                </div>
            </div>

            <!-- Filters -->
            <div style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none">
                <button class="f-btn active" onclick="setFilter('all',this)">All</button>
                <button class="f-btn" onclick="setFilter('tp',this)">🚀 TP Armed</button>
                <button class="f-btn" onclick="setFilter('profit',this)">📈 Profit</button>
                <button class="f-btn" onclick="setFilter('loss',this)">📉 Loss</button>
                <button class="f-btn" onclick="setFilter('stuck',this)">⏳ Stuck</button>
            </div>

            <!-- Search -->
            <input class="search-input" id="searchInput" onkeyup="applyFilter()" 
                placeholder="🔍 Search coin..." style="width:100%;margin-bottom:12px">

            <!-- Table -->
            <div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden">
                <table style="width:100%;border-collapse:collapse">
                    <thead>
                        <tr style="border-bottom:1px solid var(--border)">
                            <th style="padding:10px 12px;text-align:left;font-size:11px;color:var(--text3)">Coin</th>
                            <th style="padding:10px 12px;text-align:left;font-size:11px;color:var(--text3)">Bot</th>
                            <th style="padding:10px 12px;text-align:right;font-size:11px;color:var(--text3)">Avg Cost</th>
                            <th style="padding:10px 12px;text-align:right;font-size:11px;color:var(--text3)">Current</th>
                            <th style="padding:10px 12px;text-align:right;font-size:11px;color:var(--text3)">DCA#</th>
                            <th style="padding:10px 12px;text-align:right;font-size:11px;color:var(--text3)">P&L%</th>
                            <th style="padding:10px 12px;text-align:right;font-size:11px;color:var(--text3)">P&L$</th>
                            <th style="padding:10px 12px;text-align:left;font-size:11px;color:var(--text3)">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tradesTable">
                        <tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text3)">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div class="bottom-nav" id="bottom-nav"></div>
<script src="/base.js?v=4"></script>
<script>
let allPositions = [];
let currentFilter = 'all';

function statusInfo(pos) {
    const d = pos.days_open || 0;
    if (pos.tp_armed) return {label:'🚀 TP Armed', cls:'badge-tp'};
    if (d > 60) return {label:'🔴 Critical', cls:'badge-critical'};
    if (d > 30) return {label:'🟡 Stuck', cls:'badge-stuck'};
    if (pos.queued) return {label:'⏳ Queued', cls:'badge-queued'};
    return {label:'🟢 Active', cls:'badge-active'};
}

function setFilter(type, el) {
    currentFilter = type;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    if (el) el.classList.add('active');
    applyFilter();
}

function applyFilter() {
    const search = (document.getElementById('searchInput').value || '').toLowerCase();
    let data = allPositions;

    if (currentFilter === 'tp') data = data.filter(p => p.tp_armed);
    else if (currentFilter === 'profit') data = data.filter(p => p.pnl > 0);
    else if (currentFilter === 'loss') data = data.filter(p => p.pnl < 0);
    else if (currentFilter === 'stuck') data = data.filter(p => p.days_open > 30);

    if (search) data = data.filter(p => p.coin.toLowerCase().includes(search));

    renderTable(data);
}

function renderTable(data) {
    const tbody = document.getElementById('tradesTable');
    if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text3)">No trades found</td></tr>';
        return;
    }
    tbody.innerHTML = data.map(p => {
        const pnlColor = p.pnl >= 0 ? 'var(--green)' : 'var(--red)';
        const pnlPct = p.pnl_pct ? parseFloat(p.pnl_pct).toFixed(2) : '0.00';
        const pnl = p.pnl ? parseFloat(p.pnl).toFixed(2) : '0.00';
        const st = statusInfo(p);
        return `<tr style="border-bottom:1px solid var(--border)">
            <td style="padding:10px 12px;font-weight:600">${p.coin}</td>
            <td style="padding:10px 12px;font-size:11px;color:var(--text3)">${p.bot_name||'—'}</td>
            <td style="padding:10px 12px;text-align:right;font-size:12px">${fmtPrice(p.avg_cost)}</td>
            <td style="padding:10px 12px;text-align:right;font-size:12px">${fmtPrice(p.current_price)}</td>
            <td style="padding:10px 12px;text-align:right;color:var(--text3)">${p.dca_count||0}</td>
            <td style="padding:10px 12px;text-align:right;color:${pnlColor};font-weight:600">${pnlPct >= 0 ? '+' : ''}${pnlPct}%</td>
            <td style="padding:10px 12px;text-align:right;color:${pnlColor}">${pnl >= 0 ? '+' : ''}$${Math.abs(pnl)}</td>
            <td style="padding:10px 12px"><span class="badge ${st.cls}" style="font-size:10px">${st.label}</span></td>
        </tr>`;
    }).join('');
}

async function loadTrades() {
    try {
        const res = await fetch(`${API}/positions`, {headers: authHeaders()});
        allPositions = await res.json();

        // Update stats
        const total = allPositions.reduce((s,p) => s + (p.total_invested||0), 0);
        const pnl = allPositions.reduce((s,p) => s + (p.pnl||0), 0);
        const tpCount = allPositions.filter(p => p.tp_armed).length;

        document.getElementById('t-open').textContent = allPositions.length;
        document.getElementById('t-invested').textContent = '$' + total.toFixed(0);
        document.getElementById('t-pnl').textContent = (pnl>=0?'+':'') + '$' + Math.abs(pnl).toFixed(0);
        document.getElementById('t-pnl').style.color = pnl>=0?'var(--green)':'var(--red)';
        document.getElementById('t-tp').textContent = tpCount;

        applyFilter();
    } catch(e) {
        console.error(e);
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    if (!requireAuth()) return;
    document.getElementById('sidebar-placeholder').outerHTML = getSidebarHTML();
    document.getElementById('topbar-placeholder').outerHTML = getTopbarHTML('Trades');
    buildNav();
    buildUserRow();
    buildMobileNav();
    await loadTrades();
});
</script>
</body>
</html>
