<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Averion — Trades</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css?v=6">
</head>
<body>
<div id="app" style="display:flex;width:100%;height:100vh">
    <div id="sidebar-placeholder"></div>
    <div class="main">
        <div id="topbar-placeholder"></div>
        <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:16px;padding-bottom:80px">

            <!-- Stats -->
            <div class="hero-stats" style="margin-bottom:16px">
                <div class="hero-card">
                    <div class="hero-icon">📊</div>
                    <div class="hero-lbl">Open Trades</div>
                    <div class="hero-val" id="t-open">0</div>
                </div>
                <div class="hero-card">
                    <div class="hero-icon">💰</div>
                    <div class="hero-lbl">Total Invested</div>
                    <div class="hero-val" id="t-invested">$0</div>
                </div>
                <div class="hero-card">
                    <div class="hero-icon">📈</div>
                    <div class="hero-lbl">Unrealized P&L</div>
                    <div class="hero-val" id="t-pnl">$0</div>
                </div>
                <div class="hero-card">
                    <div class="hero-icon">⏳</div>
                    <div class="hero-lbl">DCA Queue</div>
                    <div class="hero-val" id="t-dca">0</div>
                </div>
            </div>

            <!-- Filters -->
            <div style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none">
                <button class="f-btn active" onclick="setFilter('all',this)">All</button>
                <button class="f-btn" onclick="setFilter('scalper',this)">⚡ Scalper</button>
                <button class="f-btn" onclick="setFilter('dca',this)">📈 DCA</button>
                <button class="f-btn" onclick="setFilter('profit',this)">🟢 Profit</button>
                <button class="f-btn" onclick="setFilter('loss',this)">🔴 Loss</button>
            </div>

            <!-- Search -->
            <input class="search-input" id="searchInput" onkeyup="applyFilter()"
                placeholder="🔍 Search coin or bot..." style="width:100%;margin-bottom:12px">

            <!-- Table -->
            <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
                <table style="width:100%;border-collapse:collapse;min-width:700px">
                    <thead>
                        <tr style="border-bottom:1px solid var(--border)">
                            <th style="padding:8px 10px;text-align:left;font-size:10px;color:var(--text3)">Type</th>
                            <th style="padding:8px 10px;text-align:left;font-size:10px;color:var(--text3)">Bot</th>
                            <th style="padding:8px 10px;text-align:left;font-size:10px;color:var(--text3)">Coin</th>
                            <th style="padding:8px 10px;text-align:right;font-size:10px;color:var(--text3)">Entry Time</th>
                            <th style="padding:8px 10px;text-align:right;font-size:10px;color:var(--text3)">Entry/Avg</th>
                            <th style="padding:8px 10px;text-align:right;font-size:10px;color:var(--text3)">Current</th>
                            <th style="padding:8px 10px;text-align:right;font-size:10px;color:var(--text3)">DCA#</th>
                            <th style="padding:8px 10px;text-align:right;font-size:10px;color:var(--text3)">Size</th>
                            <th style="padding:8px 10px;text-align:right;font-size:10px;color:var(--text3)">P&L$</th>
                            <th style="padding:8px 10px;text-align:right;font-size:10px;color:var(--text3)">P&L%</th>
                            <th style="padding:8px 10px;text-align:right;font-size:10px;color:var(--text3)">Holding</th>
                            <th style="padding:8px 10px;text-align:center;font-size:10px;color:var(--text3)">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tradesTable">
                        <tr><td colspan="12" style="text-align:center;padding:20px;color:var(--text3)">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Action Dropdown -->
<div id="actionMenu" style="display:none;position:fixed;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:8px;z-index:300;min-width:160px;box-shadow:0 8px 32px #00000080">
    <div onclick="closeAction()" style="font-size:10px;color:var(--text3);padding:4px 8px;margin-bottom:4px">Actions</div>
    <div onclick="manualClose()" style="padding:8px 12px;font-size:12px;cursor:pointer;border-radius:8px;color:var(--red)" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='none'">✕ Manual Close</div>
    <div onclick="alert('Set TP% — coming soon')" style="padding:8px 12px;font-size:12px;cursor:pointer;border-radius:8px;color:var(--text2)" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='none'">🎯 Set TP% <span style="font-size:10px;color:var(--text3)">soon</span></div>
    <div onclick="alert('Add Funds — coming soon')" style="padding:8px 12px;font-size:12px;cursor:pointer;border-radius:8px;color:var(--text2)" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='none'">💰 Add Funds <span style="font-size:10px;color:var(--text3)">soon</span></div>
</div>
<div id="actionBackdrop" onclick="closeAction()" style="display:none;position:fixed;inset:0;z-index:299"></div>

<div class="bottom-nav" id="bottom-nav"></div>
<script src="/base.js?v=6"></script>
<script>
let allPositions = [];
let currentFilter = 'all';
let activeActionId = null;

function setFilter(type, el) {
    currentFilter = type;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    if (el) el.classList.add('active');
    applyFilter();
}

function applyFilter() {
    const search = (document.getElementById('searchInput').value || '').toLowerCase();
    let data = allPositions;
    if (currentFilter === 'scalper') data = data.filter(p => p.trade_type === 'scalper');
    else if (currentFilter === 'dca') data = data.filter(p => p.trade_type === 'dca');
    else if (currentFilter === 'profit') data = data.filter(p => (p.pnl_usdt||p.pnl||0) > 0);
    else if (currentFilter === 'loss') data = data.filter(p => (p.pnl_usdt||p.pnl||0) < 0);
    if (search) data = data.filter(p => 
        (p.coin||'').toLowerCase().includes(search) ||
        (p.bot_name||'').toLowerCase().includes(search)
    );
    renderTable(data);
}

function holdingStr(entryTime, holdSeconds) {
    if (!entryTime) return '—';
    // Handle both 'YYYY-MM-DD HH:MM:SS' and ISO formats
    const cleaned = entryTime.toString().replace(' ', 'T').replace(/(\.\d+)?$/, 'Z').replace('ZZ','Z');
    const elapsed = Math.floor((Date.now() - new Date(cleaned).getTime()) / 1000);
    if (holdSeconds) {
        // Scalper - show countdown
        const remaining = holdSeconds - elapsed;
        if (remaining <= 0) return 'Closing...';
        return remaining + 's left';
    }
    // DCA - show elapsed
    const h = Math.floor(elapsed / 3600);
    const m = Math.floor((elapsed % 3600) / 60);
    if (h > 24) return Math.floor(h/24) + 'd';
    if (h > 0) return h + 'h ' + m + 'm';
    return m + 'm';
}

function openAction(id, el) {
    activeActionId = id;
    const menu = document.getElementById('actionMenu');
    const rect = el.getBoundingClientRect();
    menu.style.display = 'block';
    menu.style.top = (rect.bottom + 4) + 'px';
    menu.style.right = '16px';
    document.getElementById('actionBackdrop').style.display = 'block';
}

function closeAction() {
    document.getElementById('actionMenu').style.display = 'none';
    document.getElementById('actionBackdrop').style.display = 'none';
    activeActionId = null;
}

async function manualClose() {
    if (!activeActionId) return;
    closeAction();
    if (!confirm('Close this position manually?')) return;
    try {
        await fetch(`${API}/live-positions/${activeActionId}/close`, {
            method: 'POST', headers: authHeaders()
        });
        await loadTrades();
    } catch(e) { alert('Error closing position'); }
}

function renderTable(data) {
    const tbody = document.getElementById('tradesTable');
    if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="12" style="text-align:center;padding:30px;color:var(--text3)">No open trades</td></tr>';
        return;
    }
    tbody.innerHTML = data.map(p => {
        const isScalper = p.trade_type === 'scalper';
        const pnl = parseFloat(p.pnl_usdt || p.pnl || 0);
        const pnlPct = parseFloat(p.pnl_pct || 0);
        const color = pnl >= 0 ? 'var(--green)' : 'var(--red)';
        const entryPrice = isScalper ? p.entry_price : (p.avg_cost || p.entry_price);
        const size = isScalper ? parseFloat(p.base_order||2) : parseFloat(p.total_invested||0);
        const dcaNum = isScalper ? '—' : (p.dca_count || 0);
        const typeBadge = isScalper
            ? '<span style="font-size:9px;background:#6366F120;color:var(--accent);padding:2px 6px;border-radius:4px">⚡ Scalper</span>'
            : '<span style="font-size:9px;background:#10D98A20;color:var(--green);padding:2px 6px;border-radius:4px">📈 DCA</span>';

        return `<tr data-id="${p.id}" data-entry="${p.entry_time||''}" data-hold="${p.hold_seconds||0}" data-type="${isScalper?'scalper':'dca'}" style="border-bottom:1px solid var(--border)">
            <td style="padding:8px 10px">${typeBadge}</td>
            <td style="padding:8px 10px;font-size:11px;color:var(--text3)">${p.bot_name||'—'}</td>
            <td style="padding:8px 10px;font-weight:600;font-size:12px">${p.coin}</td>
            <td style="padding:8px 10px;text-align:right;font-size:10px;color:var(--text3)">${fmtDate(p.entry_time)}</td>
            <td style="padding:8px 10px;text-align:right;font-size:11px">${fmtPrice(entryPrice)}</td>
            <td style="padding:8px 10px;text-align:right;font-size:11px">${fmtPrice(p.current_price||entryPrice)}</td>
            <td style="padding:8px 10px;text-align:right;font-size:11px;color:var(--text3)">${dcaNum}</td>
            <td style="padding:8px 10px;text-align:right;font-size:11px">$${size.toFixed(0)}</td>
            <td style="padding:8px 10px;text-align:right;font-size:11px;color:${color};font-weight:600">${fmtPnl(pnl)}</td>
            <td style="padding:8px 10px;text-align:right;font-size:11px;color:${color}">${fmtPct(pnlPct)}</td>
            <td class="holding-cell" style="padding:8px 10px;text-align:right;font-size:10px;color:var(--text3)">${holdingStr(p.entry_time, isScalper ? p.hold_seconds : null)}</td>
            <td style="padding:8px 10px;text-align:center">
                <button onclick="openAction(${p.id}, this)" style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:10px;cursor:pointer;color:var(--text2)">⋯</button>
            </td>
        </tr>`;
    }).join('');
}

async function loadTrades() {
    try {
        const res = await fetch(`${API}/live-positions`, {headers: authHeaders()});
        const all = await res.json();
        allPositions = all
            .filter(p => p.status === 'open')
            .map(p => ({...p, trade_type: p.hold_seconds ? 'scalper' : 'dca'}));

        const total = allPositions.reduce((s,p) => s + (p.trade_type==='scalper' ? parseFloat(p.base_order||2) : parseFloat(p.total_invested||0)), 0);
        const pnl = allPositions.reduce((s,p) => s + parseFloat(p.pnl_usdt||p.pnl||0), 0);

        document.getElementById('t-open').textContent = allPositions.length;
        document.getElementById('t-invested').textContent = '$' + total.toFixed(2);
        const pnlEl = document.getElementById('t-pnl');
        pnlEl.textContent = fmtPnl(pnl);
        pnlEl.style.color = pnl >= 0 ? 'var(--green)' : 'var(--red)';
        document.getElementById('t-dca').textContent = allPositions.filter(p => p.trade_type==='dca').length;

        applyFilter();
    } catch(e) { console.error(e); }
}

let refreshInterval = null;
let countdownInterval = null;

function startRefresh() {
    if (refreshInterval) return;
    refreshInterval = setInterval(loadTrades, 3000);
    countdownInterval = setInterval(updateCountdowns, 1000);
}

function stopRefresh() {
    clearInterval(refreshInterval);
    clearInterval(countdownInterval);
    refreshInterval = null;
    countdownInterval = null;
}

function updateCountdowns() {
    // Update only countdown cells without re-rendering table
    const rows = document.querySelectorAll('#tradesTable tr[data-id]');
    rows.forEach(row => {
        const entryTime = row.dataset.entry;
        const holdSec = parseInt(row.dataset.hold || '0');
        const isScalper = row.dataset.type === 'scalper';
        if (!isScalper || !entryTime) return;
        const cell = row.querySelector('.holding-cell');
        if (cell) cell.textContent = holdingStr(entryTime, holdSec);
    });
}

// Pause when tab hidden
document.addEventListener('visibilitychange', () => {
    if (document.hidden) stopRefresh();
    else startRefresh();
});

document.addEventListener('DOMContentLoaded', async () => {
    if (!requireAuth()) return;
    document.getElementById('sidebar-placeholder').outerHTML = getSidebarHTML();
    document.getElementById('topbar-placeholder').outerHTML = getTopbarHTML('Trades');
    buildNav();
    buildUserRow();
    buildMobileNav();
    await loadTrades();
    startRefresh();
});
</script>
</body>
</html>
