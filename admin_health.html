<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Averion Admin - Health</title>
<link rel="stylesheet" href="/admin_shared.css">
<style>
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
  .service-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .service-row:last-child { border-bottom: none; }
  .service-name { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .health-item { margin-bottom: 12px; }
  .health-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
</style>
</head>
<body>

<div id="app-shell"></div>

<div class="main">
  <div id="status-banner" class="card" style="text-align:center;padding:10px;font-size:13px;font-weight:600">
    Checking systems...
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-title">Server Health</div>
      <div class="health-item">
        <div class="health-header"><span>CPU</span><span id="cpu-val">—</span></div>
        <div class="progress-bar"><div class="progress-fill" id="cpu-bar" style="width:0%;background:var(--green)"></div></div>
      </div>
      <div class="health-item">
        <div class="health-header"><span>RAM</span><span id="ram-val">—</span></div>
        <div class="progress-bar"><div class="progress-fill" id="ram-bar" style="width:0%;background:#38bdf8"></div></div>
      </div>
      <div class="health-item">
        <div class="health-header"><span>Disk</span><span id="disk-val">—</span></div>
        <div class="progress-bar"><div class="progress-fill" id="disk-bar" style="width:0%;background:var(--amber)"></div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Services</div>
      <div class="service-row">
        <div class="service-name"><span>🗄️</span> PostgreSQL</div>
        <div style="text-align:right">
          <div class="badge badge-green" id="pg-status">Checking...</div>
        </div>
      </div>
      <div class="service-row">
        <div class="service-name"><span>⚡</span> Redis</div>
        <div style="text-align:right">
          <div class="badge badge-green" id="redis-status">Checking...</div>
        </div>
      </div>
      <div class="service-row">
        <div class="service-name"><span>🤖</span> Bot Loop</div>
        <div style="text-align:right">
          <div class="badge" id="bot-badge">Checking...</div>
        </div>
      </div>
      <div class="service-row">
        <div class="service-name"><span>🔄</span> Last Cycle</div>
        <div style="color:var(--muted);font-size:12px" id="last-cycle"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Exchange WebSockets</div>
    <div id="ws-status-list">Checking...</div>
  </div>

  <div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
      Current Market Regime
      <button class="btn-xs" onclick="loadMarketRegime()">↻ Refresh</button>
    </div>
    <div id="market-regime-box">Loading...</div>
  </div>

  <div id="watchdog-status" style="margin-bottom:14px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px">
    Loading watchdog status...
  </div>

  <div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
      Daily Cron Status
      <button class="btn-xs" onclick="loadCronStatus()">↻ Refresh</button>
    </div>
    <div id="cron-grid"></div>
  </div>
</div>

<script src="/admin_shared.js"></script>
<script>
if (!requireAdminSession()) { }
else {
  renderHeaderAndTabs();
}

async function loadServices() {
  try {
    const [healthRes, statusRes] = await Promise.all([
      fetch(`${API}/health`),
      fetch(`${API}/status`, { headers: authHeaders() })
    ]);
    const hdata = await healthRes.json();
    const sdata = await statusRes.json();

    const pgEl = document.getElementById('pg-status');
    pgEl.textContent = hdata.db === 'ok' ? 'Connected' : 'Down';
    pgEl.className = 'badge ' + (hdata.db === 'ok' ? 'badge-green' : 'badge-red');

    const redisEl = document.getElementById('redis-status');
    redisEl.textContent = hdata.redis === 'ok' ? 'Connected' : 'Down';
    redisEl.className = 'badge ' + (hdata.redis === 'ok' ? 'badge-green' : 'badge-red');

    const botEl = document.getElementById('bot-badge');
    const running = sdata.running;
    botEl.textContent = running ? 'Running' : 'Stopped';
    botEl.className = 'badge ' + (running ? 'badge-green' : 'badge-red');

    document.getElementById('last-cycle').textContent = fmtLocal(sdata.last_cycle);

    const statusText = document.getElementById('status-text');
    const statusDot = document.getElementById('status-dot');
    if (statusText) {
      statusText.textContent = running
        ? `BOT RUNNING · ${sdata.cycle_time || '—'}s`
        : 'BOT STOPPED';
    }
    if (statusDot) {
      statusDot.style.background = running ? 'var(--green)' : 'var(--red)';
    }
    _lastHealthState.db = hdata.db;
    _lastHealthState.redis = hdata.redis;
    _lastHealthState.running = running;
    updateStatusBanner();
  } catch (e) {
    console.error('Services load failed', e);
  }
}

async function loadHealth() {
  try {
    const res = await fetch(`${API}/admin/health`, { headers: authHeaders() });
    const arr = await res.json();
    if (!arr.length) return;
    const d = arr[0];
    document.getElementById('cpu-val').textContent = d.cpu.toFixed(1) + '%';
    document.getElementById('cpu-bar').style.width = d.cpu + '%';
    document.getElementById('ram-val').textContent =
      `${d.ram.toFixed(1)}% · ${d.ram_used_gb}GB/${d.ram_total_gb}GB`;
    document.getElementById('ram-bar').style.width = d.ram + '%';
    document.getElementById('disk-val').textContent =
      `${d.disk.toFixed(1)}% · ${d.disk_used_gb}GB/${d.disk_total_gb}GB`;
    document.getElementById('disk-bar').style.width = d.disk + '%';
  } catch (e) {
    console.error('Health load failed', e);
  }
}

async function loadWSStatus() {
  const box = document.getElementById('ws-status-list');
  if (!box) return;
  try {
    const res = await fetch(`${API}/admin/ws-status`, { headers: authHeaders() });
    const list = await res.json();
    if (!list.length) {
      box.innerHTML = '<span style="color:var(--muted)">No exchanges configured</span>';
      return;
    }
    box.innerHTML = list.map(ex => {
      const connected = ex.status === 'connected';
      const notConfigured = ex.status === 'not_configured';
      const badgeClass = connected ? 'badge-green' : notConfigured ? '' : 'badge-red';
      const badgeStyle = notConfigured ? 'background:rgba(136,136,136,0.1);color:var(--muted)' : '';
      const label = notConfigured ? 'Not Connected' : ex.status;
      return `
        <div class="service-row">
          <div class="service-name">${ex.exchange.toUpperCase()}</div>
          <div style="text-align:right">
            <span class="badge ${badgeClass}" style="${badgeStyle}">${label}</span>
            ${connected ? `<div style="font-size:10px;color:var(--muted);margin-top:2px">
              ${ex.price_count.toLocaleString()} coins tracked · last update ${fmtLocal(ex.last_update)}
            </div>` : ''}
          </div>
        </div>`;
    }).join('');
  } catch (e) {
    box.innerHTML = `<span style="color:var(--red)">Error: ${e.message}</span>`;
  }
}

async function loadMarketRegime() {
  const box = document.getElementById('market-regime-box');
  if (!box) return;
  const refreshedAt = new Date().toLocaleTimeString();
  try {
    const res = await fetch(`${API}/admin/market-regime`, { headers: authHeaders() });
    const d = await res.json();
    if (!d.available) {
      box.innerHTML = `<span style="color:var(--muted)">No regime data cached yet</span>
        <p style="color:var(--muted);font-size:10px;margin-top:6px">Checked at ${refreshedAt}</p>`;
      return;
    }
    const regimeColor = d.btc_regime === 'bull' ? 'var(--green)' :
                         d.btc_regime === 'bear' ? 'var(--red)' : 'var(--amber)';
    const regimeEmoji = d.btc_regime === 'bull' ? '🐂' : d.btc_regime === 'bear' ? '🐻' : '↔️';
    const changeColor = d.btc_24h_change >= 0 ? 'var(--green)' : 'var(--red)';
    box.innerHTML = `
      <div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap">
        <div style="font-size:22px;font-weight:bold;color:${regimeColor}">
          ${regimeEmoji} ${d.btc_regime.toUpperCase()}
        </div>
        <div style="color:var(--muted);font-size:13px">
          BTC: <b style="color:var(--text)">$${d.btc_price?.toLocaleString()}</b>
          · SMA50: $${d.btc_sma50?.toLocaleString()}
          · 24h: <span style="color:${changeColor}">${d.btc_24h_change >= 0 ? '+' : ''}${d.btc_24h_change}%</span>
          · Dominance: ${d.btc_dominance}%
        </div>
      </div>
      <p style="color:var(--muted);font-size:10px;margin-top:8px">↻ Checked at ${refreshedAt}</p>`;
  } catch (e) {
    box.innerHTML = `<span style="color:var(--red)">Error: ${e.message}</span>`;
  }
}

async function loadWatchdogStatus() {
  const box = document.getElementById('watchdog-status');
  if (!box) return;
  const refreshedAt = new Date().toLocaleTimeString();
  try {
    const res = await fetch(`${API}/admin/watchdog-status`, { headers: authHeaders() });
    const d = await res.json();
    const live = d.live_status || {};
    const longBadge = live.long_dca_alive === true ? '🟢 Long alive' : live.long_dca_alive === false ? '🔴 Long DEAD' : '⚪ Long unknown';
    const shortBadge = live.short_dca_alive === true ? '🟢 Short alive' : live.short_dca_alive === false ? '🔴 Short DEAD' : '⚪ Short unknown';
    const liveLine = `<div style="margin-bottom:4px">${longBadge} &nbsp; ${shortBadge}</div>`;
    let historyLine;
    if (!d.last_triggered) {
      historyLine = `🟢 <b>Watchdog:</b> never had to restart an engine — healthy <span style="color:var(--muted);font-size:10px">(checked ${refreshedAt})</span>`;
      box.style.borderColor = 'rgba(16,217,138,0.3)';
    } else {
      const when = new Date(d.last_triggered).toLocaleString();
      historyLine = `🟡 <b>Watchdog:</b> last triggered ${when} (${d.engine_name}) · ${d.count_last_7_days} time(s) in last 7 days <span style="color:var(--muted);font-size:10px">(checked ${refreshedAt})</span>`;
      box.style.borderColor = 'rgba(255,165,0,0.3)';
    }
    box.innerHTML = liveLine + historyLine;
    const anyDead = live.long_dca_alive === false || live.short_dca_alive === false;
    if (anyDead) box.style.borderColor = 'rgba(239,68,68,0.4)';
    _lastHealthState.watchdogOk = !(d.count_last_7_days > 0) && !anyDead;
    updateStatusBanner();
  } catch (e) {
    box.innerHTML = 'Watchdog status unavailable';
  }
}

let _rerunPollers = {};

async function loadCronStatus() {
  try {
    const res = await fetch(`${API}/admin/cron-status`, { headers: authHeaders() });
    const cronData = await res.json();
    // Schedule times are stored as UTC (matching the actual cron
    // schedule: 0 3 * * * etc) then converted to the browser's local
    // time below - this stays correct automatically regardless of
    // timezone, DST, or travel, instead of a hardcoded offset.
    const steps = [
      { key: 'db_backup', name: 'DB Backup', utc: '03:00' },
      { key: 'system_health', name: 'System Health', utc: '03:00' },
      { key: 'classification', name: 'Classification', utc: '03:45', approx: true },
      { key: 'min_orders', name: 'Exchange Min Orders', relative: 'after Classification' },
      { key: 'params', name: 'Calculate Params', utc: '04:30', approx: true },
      { key: 'rars', name: 'RARS Scoring', utc: '05:15', approx: true },
      { key: 'champion', name: 'Champion Promotion', relative: 'after RARS' },
      { key: 'paper_timer', name: 'Paper Timer', relative: 'after RARS' },
      { key: 'btc_daily', name: 'BTC Daily Fetch', relative: 'after RARS' },
      { key: 'retention', name: 'Data Retention', relative: 'Sundays only' },
      { key: 'cleanup', name: 'Sunday Cleanup', relative: 'Sundays only' },
      { key: 'reports', name: 'Research Reports', relative: 'after RARS' },
      { key: 'telegram', name: 'Telegram Report', relative: 'after RARS' },
    ].map(s => {
      if (s.relative) { s.time = s.relative; return s; }
      s.time = (s.approx ? '~' : '') + utcHourMinToLocal(s.utc);
      return s;
    });
    const grid = document.getElementById('cron-grid');
    grid.innerHTML = steps.map(step => {
      const d = cronData[step.key];
      const status = d ? d.status : null;
      const badge = status === 'success' ? '<span class="badge badge-green">✅ Complete</span>' :
                    status === 'failed' ? '<span class="badge badge-red">❌ Failed</span>' :
                    '<span class="badge" style="background:rgba(136,136,136,0.1);color:var(--muted)">— Pending</span>';
      return `
        <div style="border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:12px">${step.time} · ${step.name}</span>
            ${badge}
          </div>
          ${d ? `<div style="font-size:10px;color:var(--muted);margin-top:4px">
            Last run: ${fmtLocal(d.completed_at)} · Duration: ${d.duration?.toFixed(1)}s · Records: ${d.records || 0}
          </div>` : ''}
          <button class="btn-xs" id="rerun-btn-${step.key}" style="margin-top:6px" onclick="rerunStep('${step.key}')">↻ Re-run</button>
        </div>`;
    }).join('');
  } catch (e) {
    document.getElementById('cron-grid').innerHTML = '<div style="color:var(--muted)">Failed to load cron status</div>';
  }
}

async function rerunStep(step) {
  try {
    const beforeRes = await fetch(`${API}/admin/cron-status`, { headers: authHeaders() });
    const before = await beforeRes.json();
    const beforeTime = before[step]?.completed_at || null;

    await fetch(`${API}/admin/cron/${step}/run`, { method: 'POST', headers: authHeaders() });

    const btn = document.getElementById(`rerun-btn-${step}`);
    if (btn) { btn.textContent = '⏳ Running...'; btn.disabled = true; }

    if (_rerunPollers[step]) clearInterval(_rerunPollers[step]);
    let attempts = 0;
    _rerunPollers[step] = setInterval(async () => {
      attempts++;
      const res = await fetch(`${API}/admin/cron-status`, { headers: authHeaders() });
      const data = await res.json();
      const nowTime = data[step]?.completed_at || null;
      if ((nowTime && nowTime !== beforeTime) || attempts >= 60) {
        clearInterval(_rerunPollers[step]);
        delete _rerunPollers[step];
        loadCronStatus();
      }
    }, 2000);
  } catch (e) { alert('Failed to start step'); }
}

let _lastHealthState = { db: null, redis: null, running: null, watchdogOk: null };

function updateStatusBanner() {
  const banner = document.getElementById('status-banner');
  if (!banner) return;
  const { db, redis, running, watchdogOk } = _lastHealthState;
  if (db === null) { banner.textContent = 'Checking systems...'; return; }

  const allGood = db === 'ok' && redis === 'ok' && running && watchdogOk !== false;
  if (allGood) {
    banner.textContent = '✅ All systems normal';
    banner.style.color = 'var(--green)';
    banner.style.borderColor = 'rgba(16,217,138,0.3)';
  } else {
    const issues = [];
    if (db !== 'ok') issues.push('Database');
    if (redis !== 'ok') issues.push('Redis');
    if (!running) issues.push('Bot stopped');
    if (watchdogOk === false) issues.push('Watchdog triggered recently');
    banner.textContent = '⚠️ Attention needed: ' + issues.join(', ');
    banner.style.color = 'var(--amber)';
    banner.style.borderColor = 'rgba(243,156,18,0.3)';
  }
}

loadServices();
loadHealth();
loadWSStatus();
loadMarketRegime();
loadWatchdogStatus();
loadCronStatus();
setInterval(loadServices, 10000);
setInterval(loadHealth, 30000);
setInterval(loadWSStatus, 10000);
setInterval(loadMarketRegime, 30000);
setInterval(loadWatchdogStatus, 30000);
setInterval(loadCronStatus, 30000);
</script>
</body>
</html>
