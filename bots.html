<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Averion — Bots</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css?v=6">
</head>
<body>
<div id="app" style="display:flex;width:100%;height:100vh">
    <div id="sidebar-placeholder"></div>
    <div class="main">
        <div id="topbar-placeholder"></div>
        <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:16px;padding-bottom:80px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
                <div>
                    <div style="font-size:15px;font-weight:800">Bots</div>
                    <div style="font-size:11px;color:var(--text3)" id="botsSubtitle">Loading...</div>
                </div>
                <button class="btn btn-accent btn-sm" onclick="window.location='/create-bot'">+ New Bot</button>
            </div>
            <div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none">
                <button class="f-btn active" onclick="setFilter('all',this)">All</button>
                <button class="f-btn" onclick="setFilter('running',this)">🟢 Running</button>
                <button class="f-btn" onclick="setFilter('stopped',this)">⬛ Stopped</button>
                <button class="f-btn" onclick="setFilter('paper',this)">📄 Paper</button>
            </div>
            <div id="botsList" style="display:flex;flex-direction:column;gap:10px">
                <div style="text-align:center;padding:40px;color:var(--text3)">Loading...</div>
            </div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div id="editModal" style="display:none;position:fixed;inset:0;background:#000000CC;z-index:200;align-items:center;justify-content:center;padding:20px">
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto">
        <div style="font-size:15px;font-weight:700;margin-bottom:4px">Edit Bot</div>
        <div id="edit-bot-subtitle" style="font-size:11px;color:var(--text3);margin-bottom:16px"></div>
        <div style="margin-bottom:12px">
            <div style="font-size:11px;color:var(--text3);margin-bottom:6px">BOT NAME</div>
            <input type="text" id="edit-name" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
        </div>
        <div style="margin-bottom:12px">
            <div style="font-size:11px;color:var(--text3);margin-bottom:6px">BASE ORDER ($) <span style="color:var(--text3);font-weight:400">· future trades only</span></div>
            <input type="number" id="edit-base-order" inputmode="decimal" step="0.01" min="0"
                style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
        </div>
        <div id="edit-dca-fields">
            <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin:14px 0 10px">Exit Settings · applies to all open trades</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
                <div>
                    <div style="font-size:11px;color:var(--text3);margin-bottom:6px">Take Profit %</div>
                    <input type="number" id="edit-tp" inputmode="decimal" step="0.5" min="0.1"
                        style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
                </div>
                <div>
                    <div style="font-size:11px;color:var(--text3);margin-bottom:6px">Trailing %</div>
                    <input type="number" id="edit-trail" inputmode="decimal" step="0.1" min="0.1"
                        style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
                </div>
            </div>
        </div>
        <div id="edit-scalper-fields" style="display:none">
            <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin:14px 0 10px">Scalper Settings · future trades only</div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">
                <div>
                    <div style="font-size:11px;color:var(--text3);margin-bottom:6px">Trigger %</div>
                    <input type="number" id="edit-trigger" inputmode="decimal" step="0.5" min="0.1"
                        style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
                </div>
                <div>
                    <div style="font-size:11px;color:var(--text3);margin-bottom:6px">Window (s)</div>
                    <input type="number" id="edit-window" inputmode="decimal" step="1" min="1"
                        style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
                </div>
                <div>
                    <div style="font-size:11px;color:var(--text3);margin-bottom:6px">Hold (s)</div>
                    <input type="number" id="edit-hold" inputmode="numeric" step="1" min="1"
                        style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
                </div>
            </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:4px">
            <button onclick="closeEditModal()" style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer">Cancel</button>
            <button onclick="saveEdit()" style="flex:1;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-weight:700;cursor:pointer">Save</button>
        </div>
    </div>
</div>

<div class="bottom-nav" id="bottom-nav"></div>
<script src="/base.js?v=7"></script>
<script>
let allBots = [];
let currentFilter = 'all';

async function setFilter(type, el) {
    currentFilter = type;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    if (el) el.classList.add('active');
    await renderBots();
}

async function renderBots() {
    const list = document.getElementById('botsList');
    let data = allBots;
    if (currentFilter === 'running') data = data.filter(b => b.trading_on && b.status === 'open');
    else if (currentFilter === 'stopped') data = data.filter(b => !b.trading_on || b.status !== 'open');
    else if (currentFilter === 'paper') data = data.filter(b => b.is_paper);

    if (!data || !data.length) {
        list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text3)">
            <div style="font-size:32px;margin-bottom:8px">🤖</div>
            <div>No bots found</div>
            <div style="margin-top:12px"><a href="/create-bot" style="color:var(--accent);text-decoration:none">+ Create your first bot</a></div>
        </div>`;
        return;
    }

    list.innerHTML = data.map(bot => {
        const running = bot.trading_on && bot.status === 'open';
        const statusColor = running ? 'var(--green)' : 'var(--text3)';
        const statusLabel = running ? '● Running' : '○ Stopped';
        const openTrades = bot.open_positions || 0;
        const worth = bot.current_worth || 0;
        const invested = bot.total_invested || 0;
        const pnl = bot.pnl_usdt || 0;
        const realizedPnl = bot.realized_pnl || 0;
        const walletAlloc = bot.wallet_total || 0;
        // Capital = wallet allocation - invested + current worth + realized pnl
        const capital = walletAlloc > 0 
            ? walletAlloc - invested + worth + realizedPnl
            : worth + realizedPnl;
        const capitalColor = capital >= walletAlloc && walletAlloc > 0 ? 'var(--green)' : capital < walletAlloc && walletAlloc > 0 ? 'var(--red)' : 'var(--text)';
        const pnlColor = pnl >= 0 ? 'var(--green)' : 'var(--red)';
        const exchange = bot.exchange_name || bot.exchange || '—';
        const walletName = bot.wallet_name || '—';
        const baseOrder = bot.base_order || 0;
        const isDca = (bot.method || '').startsWith('DCA') || (bot.method||'').startsWith('E');
        const typeEmoji = isDca ? '📈' : '⚡';
        return `
        <div onclick="window.location='/bots/${bot.id}'" style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
                <div style="font-size:14px;font-weight:700">${typeEmoji} ${bot.name}</div>
                <div style="font-size:11px;color:${statusColor};font-weight:600">${statusLabel}</div>
            </div>
            <div style="font-size:11px;color:var(--text3);margin-bottom:10px">${exchange} · ${walletName} · $${baseOrder}/trade</div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">
                <div style="background:var(--bg3);border-radius:8px;padding:8px;text-align:center">
                    <div style="font-size:10px;color:var(--text3)">Trades</div>
                    <div style="font-size:13px;font-weight:700">${openTrades}</div>
                </div>
                <div style="background:var(--bg3);border-radius:8px;padding:8px;text-align:center">
                    <div style="font-size:10px;color:var(--text3)">P&L</div>
                    <div style="font-size:13px;font-weight:700;color:${pnlColor}">${pnl>=0?'+':'-'}$${Math.abs(pnl).toFixed(2)}</div>
                </div>
                <div style="background:var(--bg3);border-radius:8px;padding:8px;text-align:center">
                    <div style="font-size:10px;color:var(--text3)">Capital</div>
                    <div style="font-size:13px;font-weight:700;color:${capitalColor}">$${capital.toFixed(2)}</div>
                </div>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
                <div style="font-size:11px;color:var(--text3)">
                    Invested <strong>$${invested.toFixed(2)}</strong> ·
                    Realized <strong style="color:${realizedPnl>=0?'var(--green)':'var(--red)'}">${realizedPnl>=0?'+':'-'}$${Math.abs(realizedPnl).toFixed(2)}</strong>
                </div>
            </div>
            <div style="display:flex;gap:8px">
                <button onclick="event.stopPropagation();toggleBot(${bot.id}, ${!bot.trading_on})"
                    style="flex:1;padding:8px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:${running ? '#F4645F20' : '#10D98A20'};color:${running ? 'var(--red)' : 'var(--green)'}">
                    ${running ? '⬛ Stop' : '▶ Start'}
                </button>
                <button onclick="event.stopPropagation();toggleInlineMenu(${bot.id})"
                    style="padding:8px 16px;border-radius:8px;font-size:16px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text)">
                    ···
                </button>
            </div>
            <div id="botmenu-${bot.id}" style="display:none;margin-top:8px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden">
                <div onclick="event.stopPropagation();botAction(${bot.id},'${bot.name}',${bot.trading_on},${bot.base_order},'edit')" style="padding:11px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)">✏️ Edit Bot</div>
                <div onclick="event.stopPropagation();botAction(${bot.id},'${bot.name}',${bot.trading_on},${bot.base_order},'panic')" style="padding:11px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);color:var(--amber)">💥 Panic Close All</div>
                <div onclick="event.stopPropagation();botAction(${bot.id},'${bot.name}',${bot.trading_on},${bot.base_order},'delete')" style="padding:11px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--red)">🗑️ Delete Bot</div>
            </div>
        </div>`;
    }).join('');
}

let _openMenuId = null;

function toggleInlineMenu(botId) {
    if (_openMenuId && _openMenuId !== botId) {
        const prev = document.getElementById('botmenu-' + _openMenuId);
        if (prev) prev.style.display = 'none';
    }
    const menu = document.getElementById('botmenu-' + botId);
    if (!menu) return;
    const isOpen = menu.style.display !== 'none';
    menu.style.display = isOpen ? 'none' : 'block';
    _openMenuId = isOpen ? null : botId;
}

async function botAction(botId, botName, tradingOn, baseOrder, action) {
    const menu = document.getElementById('botmenu-' + botId);
    if (menu) menu.style.display = 'none';
    _openMenuId = null;
    if (action === 'edit') {
        openEditModal(botId, botName, baseOrder);
    } else if (action === 'panic') {
        if (confirm('Close ALL open positions for ' + botName + ' at market price?')) {
            await panicCloseBot(botId);
        }
    } else if (action === 'delete') {
        if (confirm('Delete ' + botName + '?\n\nAll open positions will be closed at market price.')) {
            await deleteBot(botId);
        }
    }
}

async function panicCloseBot(botId) {
    try {
        const res = await fetch(`${API}/bots/${botId}/panic-close`, {method:'POST', headers:authHeaders()});
        const d = await res.json();
        alert(d.message || 'Done');
        await loadBots();
    } catch(e) { alert('Error'); }
}

async function deleteBot(botId) {
    try {
        const res = await fetch(`${API}/bots/${botId}`, {method:'DELETE', headers:authHeaders()});
        const d = await res.json();
        if (!res.ok) { alert(d.detail || 'Error'); return; }
        await loadBots();
    } catch(e) { alert('Error deleting bot'); }
}

async function toggleBot(botId, newState) {
    try {
        await fetch(`${API}/bots/${botId}/toggle`, {
            method: 'POST', headers: authHeaders(),
            body: JSON.stringify({trading_on: newState})
        });
        await loadBots();
    } catch(e) { console.error(e); }
}

// ── EDIT MODAL ──
function openEditModal(id, name, baseOrder) {
    const bot = allBots.find(b => b.id === id);
    if (!bot) return;
    const isScalper = (bot.method || '') === 'S58' || (bot.method || '').includes('S58');
    const isDca = (bot.method || '').startsWith('DCA');

    document.getElementById('edit-bot-subtitle').textContent = (bot.method || '') + ' · ' + (bot.exchange_name || '');
    document.getElementById('edit-name').value = name;
    document.getElementById('edit-base-order').value = baseOrder;

    document.getElementById('edit-dca-fields').style.display = (isDca && !isScalper) ? 'block' : 'none';
    document.getElementById('edit-scalper-fields').style.display = isScalper ? 'block' : 'none';

    if (isDca && !isScalper) {
        document.getElementById('edit-tp').value = bot.take_profit_percent || 5;
        document.getElementById('edit-trail').value = bot.trailing_percent || 2;
    }
    if (isScalper) {
        let p = {};
        try { p = bot.bot_params ? (typeof bot.bot_params === 'string' ? JSON.parse(bot.bot_params) : bot.bot_params) : {}; } catch(e) {}
        document.getElementById('edit-trigger').value = p.trigger_pct || 10;
        document.getElementById('edit-window').value = p.window_sec || 5;
        document.getElementById('edit-hold').value = p.hold_sec || 30;
    }

    window._editBotId = id;
    window._editBotType = isScalper ? 'scalper' : 'dca';
    document.getElementById('editModal').style.display = 'flex';
}

function closeEditModal() {
    document.getElementById('editModal').style.display = 'none';
}

async function saveEdit() {
    const id = window._editBotId;
    const type = window._editBotType;
    const payload = {
        name: document.getElementById('edit-name').value.trim(),
        base_order: parseFloat(document.getElementById('edit-base-order').value),
    };
    if (type === 'dca') {
        payload.take_profit_percent = parseFloat(document.getElementById('edit-tp').value);
        payload.trailing_percent = parseFloat(document.getElementById('edit-trail').value);
    }
    if (type === 'scalper') {
        payload.trigger_pct = parseFloat(document.getElementById('edit-trigger').value);
        payload.window_sec = parseFloat(document.getElementById('edit-window').value);
        payload.hold_sec = parseInt(document.getElementById('edit-hold').value);
    }
    try {
        const res = await fetch(`${API}/bots/${id}/update`, {
            method: 'POST', headers: authHeaders(),
            body: JSON.stringify(payload)
        });
        const d = await res.json();
        if (!res.ok) { alert(d.detail || 'Error saving'); return; }
        closeEditModal();
        await loadBots();
    } catch(e) { alert('Error saving bot'); }
}

async function loadBots() {
    try {
        const res = await fetch(`${API}/api/bots`, {headers: authHeaders()});
        if (res.ok) {
            allBots = await res.json();
            document.getElementById('botsSubtitle').textContent =
                `${allBots.length} bot${allBots.length !== 1 ? 's' : ''}`;
            await renderBots();
        }
    } catch(e) {
        document.getElementById('botsList').innerHTML =
            '<div style="text-align:center;padding:20px;color:var(--red)">Error loading bots</div>';
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    if (!requireAuth()) return;
    document.getElementById('sidebar-placeholder').outerHTML = getSidebarHTML();
    document.getElementById('topbar-placeholder').outerHTML = getTopbarHTML('Bots');
    buildNav();
    buildUserRow();
    buildMobileNav();
    await loadBots();
    setInterval(loadBots, 10000);
});
</script>
</body>
</html>
