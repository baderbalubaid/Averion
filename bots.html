<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Averion — Bots</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css?v=6">
</head>
<body>
<div id="app" style="display:flex;width:100%;height:100vh">
    <div id="sidebar-placeholder"></div>
    <div class="main">
        <div id="topbar-placeholder"></div>
        <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:16px;padding-bottom:80px">

            <!-- Header -->
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
                <div>
                    <div style="font-size:15px;font-weight:800">Bots</div>
                    <div style="font-size:11px;color:var(--text3)" id="botsSubtitle">Loading...</div>
                </div>
                <button class="btn btn-accent btn-sm" onclick="window.location='/create-bot'">+ New Bot</button>
            </div>

            <!-- Filters -->
            <div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none">
                <button class="f-btn active" onclick="setFilter('all',this)">All</button>
                <button class="f-btn" onclick="setFilter('running',this)">🟢 Running</button>
                <button class="f-btn" onclick="setFilter('stopped',this)">⬛ Stopped</button>
                <button class="f-btn" onclick="setFilter('paper',this)">📄 Paper</button>
            </div>

            <!-- Bots list -->
            <div id="botsList" style="display:flex;flex-direction:column;gap:10px">
                <div style="text-align:center;padding:40px;color:var(--text3)">Loading...</div>
            </div>

        </div>
    </div>
</div>
<!-- Edit Modal -->
<div id="editModal" style="display:none;position:fixed;inset:0;background:#000000CC;z-index:200;align-items:center;justify-content:center;padding:20px">
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:400px">
        <div style="font-size:15px;font-weight:700;margin-bottom:16px">Edit Bot</div>
        <div style="margin-bottom:12px">
            <div style="font-size:11px;color:var(--text3);margin-bottom:6px">BOT NAME</div>
            <input type="text" id="edit-name" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
        </div>
        <div style="margin-bottom:20px">
            <div style="font-size:11px;color:var(--text3);margin-bottom:6px">BASE ORDER ($)</div>
            <input type="number" id="edit-base-order" inputmode="decimal" step="0.01" min="0"
                style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
        </div>
        <div style="display:flex;gap:10px">
            <button onclick="closeEditModal()" style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer">Cancel</button>
            <button onclick="saveEdit()" style="flex:1;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-weight:700;cursor:pointer">Save</button>
        </div>
    </div>
</div>
<!-- Edit Modal -->
<div id="editModal" style="display:none;position:fixed;inset:0;background:#000000CC;z-index:200;align-items:center;justify-content:center;padding:20px">
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:400px">
        <div style="font-size:15px;font-weight:700;margin-bottom:16px">Edit Bot</div>
        <div style="margin-bottom:12px">
            <div style="font-size:11px;color:var(--text3);margin-bottom:6px">BOT NAME</div>
            <input type="text" id="edit-name" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
        </div>
        <div style="margin-bottom:20px">
            <div style="font-size:11px;color:var(--text3);margin-bottom:6px">BASE ORDER ($)</div>
            <input type="number" id="edit-base-order" inputmode="decimal" step="0.01" min="0"
                style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px">
        </div>
        <div style="display:flex;gap:10px">
            <button onclick="closeEditModal()" style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer">Cancel</button>
            <button onclick="saveEdit()" style="flex:1;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-weight:700;cursor:pointer">Save</button>
        </div>
    </div>
</div>
<!-- Bot action menu -->
<div id="botActionMenu" style="display:none;position:fixed;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:8px;z-index:400;min-width:180px;box-shadow:0 8px 32px #00000090">
 <div id="botMenuTitle" style="font-size:10px;color:var(--text3);padding:4px 10px 8px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);margin-bottom:6px"></div>
 <div id="botMenuStartStop" onclick="botMenuAction('toggle')" style="padding:10px 12px;font-size:13px;cursor:pointer;border-radius:8px;display:flex;align-items:center;gap:10px" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='transparent'"></div>
 <div onclick="botMenuAction('edit')" style="padding:10px 12px;font-size:13px;cursor:pointer;border-radius:8px;display:flex;align-items:center;gap:10px" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='transparent'">✏️ <span>Edit Bot</span></div>
 <div onclick="botMenuAction('panic')" style="padding:10px 12px;font-size:13px;cursor:pointer;border-radius:8px;display:flex;align-items:center;gap:10px;color:var(--amber)" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='transparent'">💥 <span>Panic Close All</span></div>
 <div style="border-top:1px solid var(--border);margin:6px 0"></div>
 <div onclick="botMenuAction('delete')" style="padding:10px 12px;font-size:13px;cursor:pointer;border-radius:8px;display:flex;align-items:center;gap:10px;color:var(--red)" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='transparent'">🗑️ <span>Delete Bot</span></div>
</div>
<div id="botMenuBackdrop" onclick="closeBotMenu()" style="display:none;position:fixed;inset:0;z-index:399"></div>

<div class="bottom-nav" id="bottom-nav"></div>
<script src="/base.js?v=6"></script>
<script>
let allBots = [];
let currentFilter = 'all';

async function setFilter(type, el) {
    currentFilter = type;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    if (el) el.classList.add('active');
    await renderBots();
}

async function renderBots() {
    const list = document.getElementById('botsList');
    let data = allBots;

    if (currentFilter === 'running') data = data.filter(b => b.trading_on && b.status === 'open');
    else if (currentFilter === 'stopped') data = data.filter(b => !b.trading_on || b.status !== 'open');
    else if (currentFilter === 'paper') data = data.filter(b => b.is_paper);

    if (!data || !data.length) {
        list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text3)">
            <div style="font-size:32px;margin-bottom:8px">🤖</div>
            <div>No bots found</div>
            <div style="margin-top:12px"><a href="/create-bot" style="color:var(--accent);text-decoration:none">+ Create your first bot</a></div>
        </div>`;
        return;
    }

    // Get positions per bot
    let positions = [];
    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 3000);
        const pr = await fetch(`${API}/positions`, {headers: authHeaders(), signal: controller.signal});
        clearTimeout(timeout);
        if (pr.ok) positions = await pr.json();
    } catch(e) { positions = []; }

    list.innerHTML = data.map(bot => {
        const running = bot.trading_on && bot.status === 'open';
        const statusColor = running ? 'var(--green)' : 'var(--text3)';
        const statusLabel = running ? '● Running' : '○ Stopped';
        const openTrades = bot.open_positions || 0;
        const worth = bot.current_worth || 0;
        const invested = bot.total_invested || 0;
        const pnl = bot.pnl_usdt || 0;
        const pnlPct = bot.pnl_pct || 0;
        const pnlColor = pnl >= 0 ? 'var(--green)' : 'var(--red)';
        const exchange = bot.exchange_name || bot.exchange || '—';
        const walletName = bot.wallet_name || '—';
        const strategy = bot.method || '—';
        const baseOrder = bot.base_order || 0;
        const isDca = strategy.startsWith('DCA');
        const typeEmoji = isDca ? '📈' : '⚡';
        return `
        <div onclick="window.location='/bots/${bot.id}'" style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
                <div style="font-size:14px;font-weight:700">${typeEmoji} ${bot.name}</div>
                <div style="font-size:11px;color:${statusColor};font-weight:600">${statusLabel}</div>
            </div>
            <div style="font-size:11px;color:var(--text3);margin-bottom:10px">${exchange} · ${walletName} · $${baseOrder}/trade</div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">
                <div style="background:var(--bg3);border-radius:8px;padding:8px;text-align:center">
                    <div style="font-size:10px;color:var(--text3)">Trades</div>
                    <div style="font-size:13px;font-weight:700">${openTrades}</div>
                </div>
                <div style="background:var(--bg3);border-radius:8px;padding:8px;text-align:center">
                    <div style="font-size:10px;color:var(--text3)">Worth</div>
                    <div style="font-size:13px;font-weight:700">$${worth.toFixed(2)}</div>
                </div>
                <div style="background:var(--bg3);border-radius:8px;padding:8px;text-align:center">
                    <div style="font-size:10px;color:var(--text3)">P&L</div>
                    <div style="font-size:13px;font-weight:700;color:${pnlColor}">${pnl>=0?'+':''}$${Math.abs(pnl).toFixed(2)}</div>
                </div>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
                <div style="font-size:11px;color:var(--text3)">
                    Invested <strong>$${invested.toFixed(2)}</strong> ·
                    Realized <strong style="color:${(bot.realized_pnl||0)>=0?'var(--green)':'var(--red)'}">${(bot.realized_pnl||0)>=0?'+':''}$${Math.abs(bot.realized_pnl||0).toFixed(2)}</strong>
                </div>
            </div>
            <div style="display:flex;gap:8px">
                <button onclick="event.stopPropagation();toggleBot(${bot.id}, ${!bot.trading_on})"
                    style="flex:1;padding:8px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:${running ? '#F4645F20' : '#10D98A20'};color:${running ? 'var(--red)' : 'var(--green)'}">
                    ${running ? '⬛ Stop' : '▶ Start'}
                </button>
                <button onclick="event.stopPropagation();openBotMenu(${bot.id},'${bot.name}',${bot.trading_on},${bot.base_order},event)"
                    style="padding:8px 16px;border-radius:8px;font-size:16px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text)">
                    ···
                </button>
            </div>
        </div>`;
    }).join('');
}

let _botMenuId = null;
let _botMenuName = null;
let _botMenuRunning = false;
let _botMenuBaseOrder = 0;

function openBotMenu(botId, botName, tradingOn, baseOrder, event) {
   event.stopPropagation();
   _botMenuId = botId;
   _botMenuName = botName;
   _botMenuRunning = tradingOn;
   _botMenuBaseOrder = baseOrder;

   const menu = document.getElementById('botActionMenu');
   const backdrop = document.getElementById('botMenuBackdrop');
   const title = document.getElementById('botMenuTitle');
   const toggleEl = document.getElementById('botMenuStartStop');

   title.textContent = botName;
   toggleEl.innerHTML = _botMenuRunning
       ? '<span>⬛</span> <span style="color:var(--red)">Stop Bot</span>'
       : '<span>▶</span> <span style="color:var(--green)">Start Bot</span>';

   // Position near button
   const rect = event.target.getBoundingClientRect();
   menu.style.top = (rect.bottom + 8) + 'px';
   menu.style.left = Math.max(8, rect.right - 180) + 'px';
   menu.style.display = 'block';
   backdrop.style.display = 'block';
}

function closeBotMenu() {
   document.getElementById('botActionMenu').style.display = 'none';
   document.getElementById('botMenuBackdrop').style.display = 'none';
}

async function botMenuAction(action) {
   closeBotMenu();
   if (action === 'toggle') {
       await toggleBot(_botMenuId, !_botMenuRunning);
   } else if (action === 'edit') {
       openEditModal(_botMenuId, _botMenuName, _botMenuBaseOrder);
   } else if (action === 'panic') {
       if (confirm(`Close ALL open positions for ${_botMenuName} at market price?`)) {
           await panicCloseBot(_botMenuId);
       }
   } else if (action === 'delete') {
       if (confirm(`Delete ${_botMenuName}?\n\nAll open positions will be closed at market price. This cannot be undone.`)) {
           await deleteBot(_botMenuId);
       }
   }
}

async function panicCloseBot(botId) {
   try {
       const res = await fetch(`${API}/bots/${botId}/panic-close`, {
           method: 'POST', headers: authHeaders()
       });
       const d = await res.json();
       alert(d.message || 'All positions closed');
       await loadBots();
   } catch(e) { alert('Error closing positions'); }
}

async function deleteBot(botId) {
   try {
       const res = await fetch(`${API}/bots/${botId}/delete`, {
           method: 'DELETE', headers: authHeaders()
       });
       const d = await res.json();
       if (!res.ok) { alert(d.detail || 'Error deleting bot'); return; }
       await loadBots();
   } catch(e) { alert('Error deleting bot'); }
}

async function toggleBot(botId, newState) {
    try {
        await fetch(`${API}/bots/${botId}/toggle`, {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({trading_on: newState})
        });
        await loadBots();
    } catch(e) { console.error(e); }
}

async function loadBots() {
    try {
        const res = await fetch(`${API}/api/bots`, {headers: authHeaders()});
        if (res.ok) {
            allBots = await res.json();
            document.getElementById('botsSubtitle').textContent = 
                `${allBots.length} bot${allBots.length !== 1 ? 's' : ''}`;
            await renderBots();
        }
    } catch(e) {
        document.getElementById('botsList').innerHTML = 
            '<div style="text-align:center;padding:20px;color:var(--red)">Error loading bots</div>';
    }
}

// ── EDIT MODAL ──
let editBotId = null;

function openEditModal(id, name, baseOrder) {
    editBotId = id;
    document.getElementById('edit-name').value = name;
    document.getElementById('edit-base-order').value = baseOrder;
    document.getElementById('editModal').style.display = 'flex';
}

function closeEditModal() {
    document.getElementById('editModal').style.display = 'none';
}

async function saveEdit() {
    const name = document.getElementById('edit-name').value.trim();
    const baseOrder = parseFloat(document.getElementById('edit-base-order').value);
    if (!name) { alert('Name required'); return; }
    if (!baseOrder || baseOrder <= 0) { alert('Base order required'); return; }
    try {
        await fetch(`${API}/bots/${editBotId}/update`, {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({name, base_order: baseOrder})
        });
        closeEditModal();
        await loadBots();
    } catch(e) { alert('Error saving'); }
}

// ── EDIT MODAL ──

function openEditModal(id, name, baseOrder) {
    editBotId = id;
    document.getElementById('edit-name').value = name;
    document.getElementById('edit-base-order').value = baseOrder;
    document.getElementById('editModal').style.display = 'flex';
}

function closeEditModal() {
    document.getElementById('editModal').style.display = 'none';
}

async function saveEdit() {
    const name = document.getElementById('edit-name').value.trim();
    const baseOrder = parseFloat(document.getElementById('edit-base-order').value);
    if (!name) { alert('Name required'); return; }
    if (!baseOrder || baseOrder <= 0) { alert('Base order required'); return; }
    try {
        await fetch(`${API}/bots/${editBotId}/update`, {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({name, base_order: baseOrder})
        });
        closeEditModal();
        await loadBots();
    } catch(e) { alert('Error saving'); }
}

document.addEventListener('DOMContentLoaded', async () => {
    if (!requireAuth()) return;
    document.getElementById('sidebar-placeholder').outerHTML = getSidebarHTML();
    document.getElementById('topbar-placeholder').outerHTML = getTopbarHTML('Bots');
    buildNav();
    buildUserRow();
    buildMobileNav();
    await loadBots();
});
</script>
</body>
</html>
