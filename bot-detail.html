<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Averion — Bot Detail</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css?v=6">
</head>
<body>
<div id="app" style="display:flex;width:100%;height:100vh">
    <div id="sidebar-placeholder"></div>
    <div class="main">
        <div id="topbar-placeholder"></div>
        <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;padding:16px;padding-bottom:80px">

            <!-- Header -->
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
                <button onclick="window.location='/bots'" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:0">‹</button>
                <div style="flex:1">
                    <div style="font-size:15px;font-weight:800" id="bot-name">Loading...</div>
                    <div style="font-size:11px;color:var(--text3)" id="bot-status">—</div>
                </div>
                <button id="toggle-btn" onclick="toggleBot()" 
                    style="padding:8px 16px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none">
                    —
                </button>
            </div>

            <!-- 4 Stats -->
            <div class="hero-stats" style="margin-bottom:16px">
                <div class="hero-card">
                    <div class="hero-icon">📊</div>
                    <div class="hero-lbl">Open</div>
                    <div class="hero-val" id="stat-open">0</div>
                </div>
                <div class="hero-card">
                    <div class="hero-icon">💰</div>
                    <div class="hero-lbl">Invested</div>
                    <div class="hero-val" id="stat-invested">$0</div>
                </div>
                <div class="hero-card">
                    <div class="hero-icon">📈</div>
                    <div class="hero-lbl">P&L$</div>
                    <div class="hero-val" id="stat-pnl">$0</div>
                </div>
                <div class="hero-card">
                    <div class="hero-icon">📉</div>
                    <div class="hero-lbl">P&L%</div>
                    <div class="hero-val" id="stat-pnlpct">0%</div>
                </div>
            </div>

            <!-- Search + Filter -->
            <input class="search-input" id="searchInput" onkeyup="applyFilter()"
                placeholder="🔍 Search coin..." style="width:100%;margin-bottom:10px">
            <div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none">
                <button class="f-btn active" onclick="setFilter('all',this)">All</button>
                <button class="f-btn" onclick="setFilter('profit',this)">📈 Profit</button>
                <button class="f-btn" onclick="setFilter('loss',this)">📉 Loss</button>
                <button class="f-btn" onclick="setFilter('tp',this)">🚀 TP Armed</button>
                <button class="f-btn" onclick="setFilter('stuck',this)">⏳ Stuck</button>
            </div>

            <!-- Positions table -->
            <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;touch-action:pan-x pan-y">
                <table style="width:100%;border-collapse:collapse;min-width:500px">
                    <!-- Column picker -->
                    <div style="display:flex;justify-content:flex-end;margin-bottom:6px">
                        <button onclick="toggleColPicker()" style="font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer">⊞ Columns</button>
                    </div>
                    <div id="colPicker" style="display:none;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px;display:none">
                        <div id="colToggles" style="display:flex;flex-wrap:wrap;gap:6px"></div>
                    </div>
                    <thead id="posTableHead">
                        <tr style="border-bottom:1px solid var(--border)">
                        </tr>
                    </thead>
                    <tbody id="posTable">
                        <tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text3)">Loading...</td></tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>
<div class="bottom-nav" id="bottom-nav"></div>
<script src="/base.js?v=7"></script>
<script>
const botId = parseInt(window.location.pathname.split('/').pop());
let botData = null;
let allPositions = [];
let currentFilter = 'all';

function statusInfo(pos) {
    if (pos.status === 'closed') return {label:'✅ Closed', color:'var(--text3)'};
    if (pos.exit_reason === 'stop_loss') return {label:'🛑 Stop Loss', color:'var(--red)'};
    return {label:'🟢 Active', color:'var(--green)'};
}

function setFilter(type, el) {
    currentFilter = type;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    if (el) el.classList.add('active');
    applyFilter();
}

function applyFilter() {
    const search = (document.getElementById('searchInput').value || '').toLowerCase();
    let data = allPositions;
    if (currentFilter === 'profit') data = data.filter(p => p.pnl > 0);
    else if (currentFilter === 'loss') data = data.filter(p => p.pnl < 0);
    else if (currentFilter === 'tp') data = data.filter(p => p.tp_armed);
    else if (currentFilter === 'stuck') data = data.filter(p => (p.days_open||0) > 30);
    if (search) data = data.filter(p => p.coin.toLowerCase().includes(search));
    renderTable(data);
}

function isBotDca() {
    return botData && ((botData.method || '').startsWith('DCA') || /^E\d+/.test(botData.method || ''));
}

function updateTableHeaders() {
    const thead = document.getElementById('posTableHead');
    if (!thead) return;
    if (isBotDca()) {
        thead.innerHTML = `<tr>
            <th style="padding:8px 10px;font-size:11px;color:var(--text3);font-weight:600;text-align:left">Coin</th>
            <th onclick="sortDetail('avg_cost')" id="dth-avg_cost" style="padding:8px 10px;font-size:11px;color:var(--text3);font-weight:600;text-align:right;cursor:pointer">Avg Cost</th>
            <th style="padding:8px 10px;font-size:11px;color:var(--text3);font-weight:600;text-align:right">Current</th>
            <th onclick="sortDetail('total_invested')" id="dth-total_invested" style="padding:8px 10px;font-size:11px;color:var(--text3);font-weight:600;text-align:right;cursor:pointer">Invested</th>
            <th onclick="sortDetail('dca_count')" id="dth-dca_count" style="padding:8px 10px;font-size:11px;color:var(--text3);font-weight:600;text-align:right;cursor:pointer">DCA#</th>
            <th onclick="sortDetail('pnl_pct')" id="dth-pnl_pct" style="padding:8px 10px;font-size:11px;color:var(--accent);font-weight:600;text-align:right;cursor:pointer">P&L% ↓</th>
            <th onclick="sortDetail('pnl_usdt')" id="dth-pnl_usdt" style="padding:8px 10px;font-size:11px;color:var(--text3);font-weight:600;text-align:right;cursor:pointer">P&L$</th>
        </tr>`;
    } else {
        thead.innerHTML = `<tr>
            <th style="padding:8px 10px;font-size:11px;color:var(--text3);font-weight:600;text-align:left">Coin</th>
            <th style="padding:8px 10px;font-size:11px;color:var(--text3);font-weight:600;text-align:right">Entry</th>
            <th style="padding:8px 10px;font-size:11px;color:var(--text3);font-weight:600;text-align:right">Current</th>
            <th style="padding:8px 10px;font-size:11px;color:var(--text3);font-weight:600;text-align:right">Hold</th>
            <th onclick="sortDetail('pnl_pct')" id="dth-pnl_pct" style="padding:8px 10px;font-size:11px;color:var(--accent);font-weight:600;text-align:right;cursor:pointer">P&L% ↓</th>
            <th onclick="sortDetail('pnl_usdt')" id="dth-pnl_usdt" style="padding:8px 10px;font-size:11px;color:var(--text3);font-weight:600;text-align:right;cursor:pointer">P&L$</th>
            <th style="padding:8px 10px;font-size:11px;color:var(--text3);font-weight:600;text-align:left">Status</th>
        </tr>`;
    }
}

let detailSortCol = 'entry_time';
let detailSortDir = 'desc';
let detailSortCount = 0;

const BOT_COLS = [
    {key:'coin',          label:'Coin',        show:true,  align:'left',  sortable:false},
    {key:'entry_time',    label:'Entry Time',  show:true,  align:'right', sortable:true},
    {key:'entry_price',   label:'Entry/Avg',   show:true,  align:'right', sortable:true},
    {key:'current_price', label:'Current',     show:true,  align:'right', sortable:false},
    {key:'dca_count',     label:'DCA#',        show:true,  align:'right', sortable:true},
    {key:'total_invested',label:'Size',        show:true,  align:'right', sortable:true},
    {key:'pnl_usdt',      label:'P&L$',        show:true,  align:'right', sortable:true},
    {key:'pnl_pct',       label:'P&L%',        show:true,  align:'right', sortable:true},
    {key:'hold',          label:'Holding',     show:true,  align:'right', sortable:false},
];

function buildColToggles() {
    document.getElementById('colToggles').innerHTML = BOT_COLS.map((c,i) =>
        `<label style="display:flex;align-items:center;gap:5px;padding:4px 8px;background:var(--bg2);border-radius:6px;cursor:pointer;font-size:11px">
            <input type="checkbox" ${c.show?'checked':''} onchange="toggleBotCol(${i},this.checked)" style="accent-color:var(--accent)">
            ${c.label}
        </label>`
    ).join('');
}

function toggleColPicker() {
    const el = document.getElementById('colPicker');
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
    buildColToggles();
}

function toggleBotCol(i, show) {
    BOT_COLS[i].show = show;
    buildPosTableHeader();
    applyFilter();
}

function buildPosTableHeader() {
    const thead = document.getElementById('posTableHead');
    if (!thead) return;
    const vis = BOT_COLS.filter(c => c.show);
    thead.innerHTML = `<tr>${vis.map(c => {
        const isSort = c.sortable;
        const arrow = isSort && c.key === detailSortCol ? (detailSortDir==='asc'?' ↑':' ↓') : '';
        const color = isSort && c.key === detailSortCol ? 'var(--accent)' : 'var(--text3)';
        const click = isSort ? `onclick="sortDetail('${c.key}')"` : '';
        return `<th ${click} style="padding:8px 10px;font-size:10px;color:${color};font-weight:600;text-align:${c.align};${isSort?'cursor:pointer':''}">
            ${c.label}${arrow}
        </th>`;
    }).join('')}</tr>`;
}

function sortDetail(col) {
   if (detailSortCol === col) {
       detailSortCount = (detailSortCount + 1) % 3;
       if (detailSortCount === 0) { detailSortCol = 'entry_time'; detailSortDir = 'desc'; }
       else if (detailSortCount === 1) detailSortDir = 'asc';
       else detailSortDir = 'desc';
   } else {
       detailSortCol = col;
       detailSortDir = 'asc';
       detailSortCount = 1;
   }
   buildPosTableHeader();
   applyFilter();
}

function applyDetailSort(data) {
   return [...data].sort((a,b) => {
       let va, vb;
       if (detailSortCol === 'entry_time') {
           va = new Date(a.entry_time || 0).getTime();
           vb = new Date(b.entry_time || 0).getTime();
       } else {
           va = parseFloat(a[detailSortCol] || 0);
           vb = parseFloat(b[detailSortCol] || 0);
       }
       return detailSortDir === 'asc' ? va - vb : vb - va;
   });
}

function renderTable(data) {
    data = applyDetailSort(data);
    const tbody = document.getElementById('posTable');
    const vis = BOT_COLS.filter(c => c.show);
    if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="${vis.length}" style="text-align:center;padding:20px;color:var(--text3)">No open positions</td></tr>`;
        return;
    }
    const dca = isBotDca();
    tbody.innerHTML = data.map(p => {
        const pnl = parseFloat(p.pnl_usdt || p.pnl || 0);
        const pnlPct = parseFloat(p.pnl_pct || 0);
        const color = pnl >= 0 ? 'var(--green)' : 'var(--red)';
        const avgCost = parseFloat(p.avg_cost || p.entry_price || 0);
        const entryPrice = parseFloat(p.entry_price || p.fill_price || avgCost);
        const invested = parseFloat(p.total_invested || p.base_order || 0);
        const dcaCount = parseInt(p.dca_count || 0);
        const cur = parseFloat(p.current_price || avgCost);
        const entryTime = (p.entry_time||'').replace(' ','T');
        const holdSec = p.hold_seconds || 0;
        
        const cellMap = {
            'coin':           `<td style="padding:8px 10px;font-weight:600;font-size:12px">${p.coin}</td>`,
            'entry_time':     `<td style="padding:8px 10px;text-align:right;font-size:11px;color:var(--text3)">${entryTime ? new Date(entryTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '—'}</td>`,
            'entry_price':    `<td style="padding:8px 10px;text-align:right;font-size:11px">${fmtPrice(isBotDca() ? avgCost : entryPrice)}</td>`,
            'current_price':  `<td style="padding:8px 10px;text-align:right;font-size:11px">${fmtPrice(cur)}</td>`,
            'dca_count':      `<td style="padding:8px 10px;text-align:right;font-size:11px;color:var(--purple)">${dcaCount}</td>`,
            'total_invested': `<td style="padding:8px 10px;text-align:right;font-size:11px;color:var(--accent)">$${invested.toFixed(2)}</td>`,
            'pnl_usdt':       `<td style="padding:8px 10px;text-align:right;font-size:11px;color:${color}">${fmtPnl(pnl)}</td>`,
            'pnl_pct':        `<td style="padding:8px 10px;text-align:right;font-size:11px;color:${color};font-weight:600">${fmtPct(pnlPct)}</td>`,
            'hold':           `<td style="padding:8px 10px;text-align:right;font-size:11px;color:var(--text3)">${holdingStr(p.entry_time, holdSec)}</td>`,
        };
        
        const vis = BOT_COLS.filter(c => c.show);
        return `<tr style="border-bottom:1px solid var(--border)">${vis.map(c => cellMap[c.key] || '<td>—</td>').join('')}</tr>`;
    }).join('');
}
function updateStats() {
    const total = allPositions.reduce((s,p) => s+(p.total_invested||p.base_order||0), 0);
    const pnl = allPositions.reduce((s,p) => s+(p.pnl_usdt||p.pnl||0), 0);
    const pnlPct = total > 0 ? (pnl/total*100) : 0;
    document.getElementById('stat-open').textContent = allPositions.length;
    document.getElementById('stat-invested').textContent = '$'+total.toFixed(0);
    const pnlEl = document.getElementById('stat-pnl');
    pnlEl.textContent = (pnl>=0?'+':'')+'$'+Math.abs(pnl).toFixed(2);
    pnlEl.style.color = pnl>=0?'var(--green)':'var(--red)';
    const pctEl = document.getElementById('stat-pnlpct');
    pctEl.textContent = (pnlPct>=0?'+':'')+pnlPct.toFixed(2)+'%';
    pctEl.style.color = pnlPct>=0?'var(--green)':'var(--red)';
}

function updateToggleBtn() {
    const btn = document.getElementById('toggle-btn');
    const running = botData && botData.trading_on && botData.status === 'open';
    btn.textContent = running ? '⬛ Stop' : '▶ Start';
    btn.style.background = running ? 'var(--red)20' : 'var(--green)20';
    btn.style.color = running ? 'var(--red)' : 'var(--green)';
    
    const statusEl = document.getElementById('bot-status');
    statusEl.textContent = running ? '● Running' : '○ Stopped';
    statusEl.style.color = running ? 'var(--green)' : 'var(--text3)';
}

async function toggleBot() {
    if (!botData) return;
    const newState = !(botData.trading_on && botData.status === 'open');
    try {
        await fetch(`${API}/bots/${botId}/toggle`, {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({trading_on: newState})
        });
        botData.trading_on = newState;
        updateToggleBtn();
    } catch(e) { console.error(e); }
}

async function loadBot() {
    try {
        const res = await fetch(`${API}/api/bots`, {headers: authHeaders()});
        const bots = await res.json();
        botData = bots.find(b => b.id === botId);
        if (!botData) {
            document.getElementById('bot-name').textContent = 'Bot not found';
            return;
        }
        document.getElementById('bot-name').textContent = botData.name;
        updateToggleBtn();
        updateTableHeaders();

    } catch(e) { console.error(e); }
}

async function loadPositions() {
    try {
        const res = await fetch(`${API}/live-positions`, {headers: authHeaders()});
        const all = await res.json();
        allPositions = all.filter(p => parseInt(p.bot_id) === parseInt(botId) && p.status === 'open');
        updateStats();
        applyFilter();
    } catch(e) { console.error(e); }
}

document.addEventListener('DOMContentLoaded', async () => {
    if (!requireAuth()) return;
    document.getElementById('sidebar-placeholder').outerHTML = getSidebarHTML();
    document.getElementById('topbar-placeholder').outerHTML = getTopbarHTML('Bot Detail');
    buildNav();
    buildUserRow();
    buildMobileNav();
    await loadBot();
    await loadPositions();
    setInterval(loadPositions, 5000);
});
</script>
</body>
</html>
